<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BoxHive - Courier Products</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">BoxHive</div>
            <ul class="nav-links">
                <li><a href="#hero">Home</a></li>
                <li><a href="#products">Products</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#contact">Contact</a></li>
                <li><button id="cartBtn">Cart (<span id="cart-count">0</span>)</button></li>
            </ul>
        </nav>
    </header>

    <section id="hero">
        <h1>Welcome to BoxHive</h1>
        <p>Your best courier products provider.</p>
    </section>

    <section id="products">
        <h2>Our Products</h2>
        <div class="products-grid">
            <!-- Product Items will be dynamically added here -->
        </div>
    </section>

    <section id="shopping-cart-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2>Your Cart</h2>
            <div id="cart-items"></div>
            <button id="checkoutBtn">Checkout</button>
        </div>
    </section>

    <section id="about">
        <h2>About Us</h2>
        <p>BoxHive is dedicated to providing top-notch courier services with unbeatable efficiency.</p>
    </section>

    <section id="contact">
        <h2>Contact Us</h2>
        <form id="contactForm">
            <input type="text" id="name" placeholder="Your Name" required>
            <input type="email" id="email" placeholder="Your Email" required>
            <textarea id="message" placeholder="Your Message" required></textarea>
            <button type="submit">Send</button>
        </form>
    </section>

    <footer>
        <p>&copy; 2026 BoxHive. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
